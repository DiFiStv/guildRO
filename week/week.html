<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дела гильдии - SUPER местечко</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="week.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="../index.html" class="home-btn">🏠 На главную</a>
            <span class="page-title">📋 Еженедельные активности</span>
            <a href="../shadow.html" class="switch-btn">🔨 К теням →</a>
        </div>

        <div class="week-header">
            <h1>📋 ЕЖЕНЕДЕЛЬНЫЕ АКТИВНОСТИ ГИЛЬДИИ SUPER</h1>
            <div class="week-controls">

                <span id="weekInfo" class="week-info">📅 Неделя: Загрузка...</span>
            </div>
        </div>

        <div id="tableContainer">
            <div style="text-align: center; color: #888; padding: 40px;">Загрузка данных...</div>
        </div>

        <div class="legend">
            <span class="legend-item">
                <span class="legend-symbol symbol-ok">✅</span> Выполнено
            </span>
            <span class="legend-item">
                <span class="legend-symbol symbol-wait">⏹</span> В процессе
            </span>
            <span class="legend-item">
                <span class="legend-symbol symbol-no">❌</span> Не выполнено
            </span>
        </div>

        <!-- КВМ Очки -->
        <div class="kvm-section">
            <h3>📊 КВМ ОЧКИ</h3>
            <div class="kvm-row">
                <div class="kvm-item">
                    <label>Вторник:</label>
                    <input type="number" id="kvmTuePoints" min="0" max="9999" value="0" oninput="updateKvmTotal()">
                </div>
                <div class="kvm-item">
                    <label>Четверг:</label>
                    <input type="number" id="kvmThuPoints" min="0" max="9999" value="0" oninput="updateKvmTotal()">
                </div>
                <div class="kvm-item">
                    <label>Воскресенье:</label>
                    <input type="number" id="kvmSunPoints" min="0" max="9999" value="0" oninput="updateKvmTotal()">
                </div>
            </div>
            <div class="kvm-total" id="kvmTotal">
                <span>📊 Итого КВМ очков: <strong id="kvmTotalSum">0</strong></span>
            </div>
        </div>

        <!-- Иномир -->
        <div class="otherworld-section">
            <div class="otherworld-cloud" id="otherworldCloud">
                <div class="particles">
                    <span class="particle">✦</span>
                    <span class="particle">✦</span>
                    <span class="particle">✦</span>
                    <span class="particle">✦</span>
                    <span class="particle">✦</span>
                    <span class="particle">✦</span>
                    <span class="particle">✦</span>
                    <span class="particle">✦</span>
                </div>
                <div class="otherworld-content">
                    <div class="otherworld-title" id="otherworldTitle">🌌 ИНОМИР</div>
                    <div class="otherworld-info" id="otherworldInfo">Набирает силы...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="week.js"></script>
</body>
</html>
