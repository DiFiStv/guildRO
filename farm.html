<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор фарма - SUPER местечко</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html" class="home-btn">🏠 На главную</a>
            <span class="page-title">⚔️ Калькулятор фарма</span>
            <a href="shadow.html" class="switch-btn">🔨 К теням →</a>
        </div>
        
        <div class="input-group">
            <label>🎯 Ваш уровень:</label>
            <input type="number" id="playerLevel" value="70" min="1" max="150">
        </div>
        
        <div class="input-group">
            <label>🎚️ Множитель сервера:</label>
            <input type="range" id="serverBonus" min="0.5" max="20" step="0.1" value="1.0">
            <div class="flex-between">
                <span>0.5x</span>
                <span id="serverBonusValue">1.0x</span>
                <span>20x</span>
            </div>
        </div>
        
        <div class="switch">
            <input type="checkbox" id="advancedMode">
            <label>🔧 Расширенный режим</label>
        </div>
        
        <div id="advancedPanel" class="advanced-panel">
            <!-- Выбор моба -->
            <div class="row">
                <div class="input-group">
                    <label>📏 Размер моба:</label>
                    <select id="monsterSize">
                        <option value="small">Маленький [S]</option>
                        <option value="medium" selected>Средний [M]</option>
                        <option value="large">Большой [L]</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>👾 Моб:</label>
                    <select id="monsterSelect">
                        <option value="">Загружаем...</option>
                    </select>
                </div>
            </div>
            
            <!-- Параметры пати -->
            <div class="row">
                <div class="input-group">
                    <label>👥 Человек в пати:</label>
                    <select id="partySize">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5" selected>5</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>🎭 Разных классов в пати:</label>
                    <select id="classVariety">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
            </div>
            
            <div class="input-group">
                <label>⏱️ Время на убийство моба (сек):</label>
                <input type="number" id="killTime" min="0.1" step="0.1" value="5.0">
                <div class="odin-info">
                    💡 Если вы убиваете монстров в пати, то нужно посчитать. Например, если каждый из 5 членов группы убивает одного монстра за 3 секунды, то получается, что вы убиваете вместе одного моба за 0.6 сек.
                </div>
            </div>
        </div>
        
        <button id="calculateBtn" style="background: #ffd700;">🔍 НАЙТИ ЛУЧШИЕ ВАРИАНТЫ</button>
        
        <div id="results" class="results">
            <div style="text-align: center; color: #888;">Введите уровень и нажмите кнопку</div>
        </div>
    </div>

    <script src="farm.js"></script>
</body>
</html>
